workflows:
  ios-build:
    name: iOS Build (Capacitor)
    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build || true

      - name: Fix permissions
        script: chmod +x node_modules/.bin/*

      - name: Sync Capacitor
        script: npx cap sync ios --no-build

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build

    artifacts:
      - ios/App/build/**/*.app