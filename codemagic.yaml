workflows:
  ios-build:
    name: iOS Build (Capacitor)

    environment:
      xcode: latest
      node: 20

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build || true

      - name: Clean iOS (safe reset)
        script: |
          rm -rf ios

      - name: Install Capacitor stable version
        script: |
          npm install @capacitor/cli@7 @capacitor/core@7 @capacitor/ios@7

      - name: Recreate iOS project properly
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Verify Podfile
        script: |
          ls ios/App

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build

    artifacts:
      - ios/App/build/**/*.app