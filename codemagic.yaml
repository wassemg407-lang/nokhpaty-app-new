workflows:
  ios-build:
    name: iOS Build (Capacitor)

    environment:
      xcode: latest
      node: 20

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build || true

      - name: Prepare Capacitor iOS
        script: |
          npm install @capacitor/cli @capacitor/core @capacitor/ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install || true

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build

    artifacts:
      - ios/App/build/**/*.app