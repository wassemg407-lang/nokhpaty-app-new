workflows:
  ios-build:
    name: iOS Build (Capacitor)

    environment:
      xcode: latest
      node: 20

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build || true

      - name: Fix permissions
        script: chmod +x node_modules/.bin/*

      - name: Install Capacitor stable version
        script: |
          npm install @capacitor/cli@7 @capacitor/core@7 @capacitor/ios@7

      - name: Prepare Capacitor iOS
        script: |
          npx cap sync ios

      - name: Show iOS folder (debug)
        script: |
          ls ios/App || true

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install || true

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build

    artifacts:
      - ios/App/build/**/*.app